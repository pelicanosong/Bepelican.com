# BePelican — frontend estático (SPA)
# Cert: Let's Encrypt (bepelican.com + www) o Cloudflare Origin Certificate

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bepelican.com www.bepelican.com;

    ssl_certificate     /etc/letsencrypt/live/bepelican.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bepelican.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/bepelican;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # pdf.js worker (.mjs) — debe ser application/javascript para dynamic import
    location ~ \.mjs$ {
        default_type application/javascript;
        add_header Cache-Control "public, immutable";
        expires 1y;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}

server {
    listen 80;
    listen [::]:80;
    server_name bepelican.com www.bepelican.com;
    return 301 https://$host$request_uri;
}

# Fallback: acceso directo por IP (solo HTTP)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/bepelican;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
