# BePelican — frontend estático (SPA)
# Tras Cloudflare: SSL Full (strict) + Origin Certificate en /etc/ssl/cloudflare/

server {
    listen 80;
    listen [::]:80;
    server_name bepelican.com www.bepelican.com;

    root /var/www/bepelican;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Cuando tengas Origin Certificate de Cloudflare, descomentá el bloque
    # en docs/despliegue-contabo-cloudflare.md y redirigí HTTP → HTTPS.
}

# Fallback: acceso directo por IP (dev / prueba)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/bepelican;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
